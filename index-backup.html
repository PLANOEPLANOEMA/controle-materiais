<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Materiais de Empréstimo - Plano & Plano</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-dark:  #1F3864;
      --blue-mid:   #2E75B6;
      --blue-light: #DDEEFF;
      --accent:     #E84545;
      --success:    #27AE60;
      --warning:    #F5A623;
      --bg:         #F0F4FA;
      --card:       #FFFFFF;
      --text:       #1a2340;
      --muted:      #6b7a99;
      --radius:     14px;
      --shadow:     0 4px 24px rgba(31,56,100,.10);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 1rem;
    }
    #login-screen.hidden {
      display: none;
    }
    .login-container {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 3rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .login-logo {
      margin-bottom: 2rem;
    }
    .login-logo img {
      height: 80px;
      width: auto;
      object-fit: contain;
    }
    .login-container h1 {
      font-size: 1.8rem;
      color: var(--blue-dark);
      margin-bottom: 0.5rem;
      font-weight: 800;
    }
    .login-container p {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .login-form .form-group {
      text-align: left;
    }
    .login-form label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--blue-dark);
      font-size: 0.9rem;
    }
    .login-form input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #c8d6ea;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }
    .login-form input:focus {
